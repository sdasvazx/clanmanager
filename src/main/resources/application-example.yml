spring:
  datasource:
    # MySQL에서 `CREATE DATABASE clanmanager;`를 먼저 실행하세요.
    url: jdbc:mysql://localhost:3306/clanmanager?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: your-mysql-password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
